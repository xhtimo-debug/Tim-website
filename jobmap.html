<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>思维导图：What makes a job great?</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 和 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 引入 Babel 以解析 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap');

        body {
            font-family: 'Nunito', 'Comic Sans MS', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(186, 230, 253, 0.4), transparent 40%),
                radial-gradient(circle at 80% 30%, rgba(253, 230, 138, 0.3), transparent 40%);
            min-height: 100vh;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.5); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(125, 211, 252, 0.8); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(56, 189, 248, 1); }

        /* 节点入场动画：从左侧弹性滑入 */
        .node-enter {
            animation: slideInElastic 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            transform-origin: left center;
        }

        @keyframes slideInElastic {
            0% { transform: scale(0.5) translateX(-20px); opacity: 0; }
            100% { transform: scale(1) translateX(0); opacity: 1; }
        }

        /* 头像占位符样式 */
        .avatar-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #e0f2fe, #bae6fd);
            color: #0369a1;
            font-size: 1.2rem;
            text-align: center;
            line-height: 1.1;
            padding: 4px;
        }

        /* 魔法连接线动画 */
        .magic-line {
            background-size: 10px 10px;
            background-image: linear-gradient(to right, #7dd3fc 50%, transparent 50%);
            animation: moveDashedLine 1s linear infinite;
        }

        @keyframes moveDashedLine {
            0% { background-position: 0 0; }
            100% { background-position: 10px 0; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 数据结构：融入了真实的刘涛、苏海、杨玲头像
        const mindMapData = {
            title: "What makes a job great?",
            type: "root",
            children: [
                {
                    type: "family",
                    image: "https://img.heliar.top/file/1775834347697_截屏2026-04-10_23.18.16.png", // 刘涛
                    children: [
                        {
                            title: "Father", type: "person", icon: "👨",
                            children: [{
                                title: "taxi driver", type: "job", icon: "🚕",
                                children: [{ title: "take people to different places", type: "reason", icon: "🗺️" }]
                            }]
                        },
                        {
                            title: "Mother", type: "person", icon: "👩",
                            children: [{
                                title: "cook", type: "job", icon: "👩‍🍳",
                                children: [{ title: "make delicious food", type: "reason", icon: "🍲" }]
                            }]
                        }
                    ]
                },
                {
                    type: "family",
                    image: "https://img.heliar.top/file/1775834334119_截屏2026-04-10_23.18.37.png", // 苏海
                    children: [
                        {
                            title: "Father", type: "person", icon: "👨",
                            children: [{
                                title: "doctor", type: "job", icon: "👨‍⚕️",
                                children: [{ title: "help sick people", type: "reason", icon: "❤️" }]
                            }]
                        },
                        {
                            title: "Mother", type: "person", icon: "👩",
                            children: [{
                                title: "worker", type: "job", icon: "👷‍♀️",
                                children: [{ title: "make nice sweets", type: "reason", icon: "🍬" }]
                            }]
                        }
                    ]
                },
                {
                    type: "family",
                    image: "https://img.heliar.top/file/1775834336086_截屏2026-04-10_23.18.24.png", // 杨玲
                    children: [
                        {
                            title: "Father", type: "person", icon: "👨",
                            children: [{
                                title: "police officer", type: "job", icon: "👮‍♂️",
                                children: [{ title: "keep us safe", type: "reason", icon: "🛡️" }]
                            }]
                        },
                        {
                            title: "Mother", type: "person", icon: "👩",
                            children: [{
                                title: "teacher", type: "job", icon: "👩‍🏫",
                                children: [{ title: "help children learn new things", type: "reason", icon: "📚" }]
                            }]
                        }
                    ]
                }
            ]
        };

        // 递归渲染树节点组件
        const TreeNode = ({ node, isFirst, isLast, expandAllTrigger, collapseAllTrigger }) => {
            // 根节点默认展开，Family 节点也强制展开，实现“一起出现”的效果
            const [expanded, setExpanded] = useState(node.type === 'root' || node.type === 'family');

            useEffect(() => {
                if (expandAllTrigger > 0) setExpanded(true);
            }, [expandAllTrigger]);

            useEffect(() => {
                if (collapseAllTrigger > 0) {
                    // 折叠时，只有根节点和Family节点保持展开（Family没有折叠状态）
                    setExpanded(node.type === 'root' || node.type === 'family'); 
                }
            }, [collapseAllTrigger]);

            const toggleExpand = () => {
                // Family 层级不可点击折叠
                if (node.type === 'family') return;
                if (node.children) setExpanded(!expanded);
            };

            let nodeStyle = "";
            let content = null;

            if (node.type === 'root') {
                // 根节点：最高层级的主题，渐变光泽
                nodeStyle = "bg-gradient-to-r from-blue-500 via-sky-500 to-indigo-500 text-white text-3xl md:text-4xl font-black px-10 py-6 rounded-[2.5rem] shadow-[0_15px_40px_-10px_rgba(59,130,246,0.6)] border-4 border-white/40 cursor-pointer hover:scale-105 transition-all duration-300 relative overflow-hidden group";
                content = (
                    <div className="flex items-center space-x-4 relative z-10">
                        <span className="text-5xl drop-shadow-lg group-hover:rotate-12 transition-transform">🎯</span>
                        <span className="tracking-wide" style={{textShadow: "0 2px 4px rgba(0,0,0,0.3)"}}>{node.title}</span>
                    </div>
                );
            } else if (node.type === 'family') {
                // 家庭层级：纯真实头像展示，无文字，不可点击（鼠标悬停也没有交互变化，保持纯净）
                nodeStyle = "relative z-10 flex-shrink-0";
                content = (
                    <div className="w-[84px] h-[84px] rounded-full border-4 border-white shadow-[0_8px_20px_rgba(0,0,0,0.15)] overflow-hidden bg-sky-100 relative">
                        <img 
                            src={node.image} 
                            alt="Avatar" 
                            className="w-full h-full object-cover" 
                            onError={(e) => {
                                e.target.style.display = 'none';
                                const span = document.createElement('span');
                                span.className = 'w-full h-full avatar-placeholder font-black tracking-widest';
                                span.innerText = '?';
                                e.target.parentNode.appendChild(span);
                            }}
                        />
                    </div>
                );
            } else if (node.type === 'person') {
                // 父母层级：柔和的童话色调
                nodeStyle = "bg-indigo-50 text-indigo-800 text-xl font-black px-6 py-3 rounded-full shadow-sm cursor-pointer hover:bg-indigo-100 hover:shadow-md transition-all border-2 border-indigo-100 flex items-center space-x-3";
                content = (
                    <>
                        <span className="text-2xl">{node.icon}</span>
                        <span className="tracking-widest uppercase text-sm">{node.title}</span>
                    </>
                );
            } else if (node.type === 'job') {
                // 职业层级：统一且美观的高级配色
                nodeStyle = `bg-white px-6 py-4 rounded-[1.5rem] shadow-[0_5px_15px_rgba(0,0,0,0.08)] border-b-4 border-sky-300 cursor-pointer hover:shadow-xl hover:-translate-y-1 transition-all flex items-center space-x-4`;
                content = (
                    <>
                        <div className="bg-slate-50 w-14 h-14 rounded-full flex items-center justify-center text-3xl shadow-inner border border-slate-100">
                            {node.icon}
                        </div>
                        <span className="text-2xl font-black text-slate-700 tracking-wide uppercase">
                            {node.title}
                        </span>
                        {/* 极简提示：只有当还有子节点且未展开时，显示跳动的 ❓ */}
                        {node.children && !expanded && (
                            <span className="ml-2 text-2xl filter drop-shadow-md animate-bounce">
                                ❓
                            </span>
                        )}
                    </>
                );
            } else if (node.type === 'reason') {
                // 原因层级：温暖的黄色便签风格
                nodeStyle = "bg-gradient-to-br from-amber-50 to-yellow-100 px-6 py-4 rounded-[1.5rem] shadow-md border border-amber-200 flex items-center space-x-4 cursor-default transform hover:rotate-1 transition-transform";
                content = (
                    <>
                        <span className="text-3xl filter drop-shadow-sm">{node.icon}</span>
                        <span className="text-2xl font-black text-slate-700 tracking-wide">
                            {node.title}
                        </span>
                    </>
                );
            }

            return (
                <div className="flex items-center node-enter min-w-max">
                    {/* 节点主体 */}
                    <div onClick={toggleExpand} className={`${nodeStyle}`}>
                        {content}
                    </div>

                    {/* 子节点连线与递归容器 */}
                    {expanded && node.children && (
                        <div className="relative flex flex-col ml-8 py-2">
                            {/* 父节点引出的横线 */}
                            <div className="absolute -left-8 top-1/2 w-8 h-[3px] magic-line -translate-y-1/2"></div>
                            
                            {node.children.map((child, idx) => {
                                const isFirstChild = idx === 0;
                                const isLastChild = idx === node.children.length - 1;
                                const isOnlyChild = node.children.length === 1;

                                return (
                                    <div key={idx} className="relative flex items-center py-5 pl-10">
                                        {/* 子节点垂直干线 (动态计算高度) */}
                                        {!isOnlyChild && (
                                            <div className={`absolute left-0 w-[3px] bg-sky-200
                                                ${isFirstChild ? 'top-1/2 bottom-0 rounded-tl-lg' : ''}
                                                ${isLastChild ? 'top-0 h-1/2 rounded-bl-lg' : ''}
                                                ${!isFirstChild && !isLastChild ? 'top-0 bottom-0' : ''}
                                            `}></div>
                                        )}
                                        {/* 从垂直干线到当前子节点的横线 */}
                                        <div className="absolute left-0 top-1/2 w-10 h-[3px] bg-sky-200 -translate-y-1/2 rounded-r-lg"></div>
                                        
                                        {/* 递归渲染子节点 */}
                                        <TreeNode 
                                            node={child} 
                                            isFirst={isFirstChild} 
                                            isLast={isLastChild}
                                            expandAllTrigger={expandAllTrigger}
                                            collapseAllTrigger={collapseAllTrigger}
                                        />
                                    </div>
                                )
                            })}
                        </div>
                    )}
                </div>
            );
        };

        function App() {
            const [expandAllTrigger, setExpandAllTrigger] = useState(0);
            const [collapseAllTrigger, setCollapseAllTrigger] = useState(0);

            const handleExpandAll = () => setExpandAllTrigger(prev => prev + 1);
            const handleCollapseAll = () => setCollapseAllTrigger(prev => prev + 1);

            return (
                <div className="w-full h-screen flex flex-col relative overflow-hidden bg-slate-50">
                    
                    {/* 顶部控制栏 (玻璃质感) */}
                    <div className="w-full bg-white/70 backdrop-blur-xl shadow-sm p-4 md:px-10 flex flex-col md:flex-row items-center justify-between z-20 border-b border-slate-200/50">
                        <div className="flex items-center space-x-4 mb-4 md:mb-0">
                            <div className="w-12 h-12 bg-gradient-to-br from-yellow-300 to-orange-400 rounded-2xl flex items-center justify-center shadow-lg transform -rotate-6">
                                <span className="text-2xl text-white">💡</span>
                            </div>
                            <div>
                                <h1 className="text-2xl md:text-3xl font-black text-slate-800 tracking-wide">Let's Review</h1>
                                <p className="text-sm font-bold text-sky-600 tracking-wider">Explore the mind map!</p>
                            </div>
                        </div>
                        <div className="flex space-x-4">
                            <button 
                                onClick={handleExpandAll}
                                className="bg-gradient-to-r from-sky-500 to-blue-600 hover:from-sky-400 hover:to-blue-500 text-white font-black py-3 px-8 rounded-full shadow-[0_8px_15px_-5px_rgba(59,130,246,0.5)] transition-all active:scale-95 active:shadow-none"
                            >
                                Expand All
                            </button>
                            <button 
                                onClick={handleCollapseAll}
                                className="bg-white hover:bg-slate-50 text-slate-600 font-black py-3 px-8 rounded-full shadow-[0_8px_15px_-5px_rgba(0,0,0,0.1)] border-2 border-slate-200 transition-all active:scale-95 active:shadow-none"
                            >
                                Reset
                            </button>
                        </div>
                    </div>

                    {/* 思维导图核心展示区：支持鼠标自由滑动和拖拽（视浏览器支持而定） */}
                    <div className="flex-1 overflow-auto p-10 md:p-20 relative scroll-smooth" id="mindmap-container">
                        <TreeNode 
                            node={mindMapData} 
                            expandAllTrigger={expandAllTrigger}
                            collapseAllTrigger={collapseAllTrigger}
                        />
                    </div>

                    {/* ✨ Tim 的专属水印标记 ✨ */}
                    <div className="fixed bottom-6 right-6 z-40 bg-white/80 backdrop-blur-lg px-6 py-2.5 rounded-full shadow-[0_8px_20px_rgba(0,0,0,0.08)] border border-white flex items-center space-x-2 transition-all hover:scale-105 cursor-default">
                        <span className="text-xl">✨</span>
                        <span className="font-black tracking-widest uppercase text-sm md:text-base bg-gradient-to-r from-sky-500 to-blue-600 text-transparent bg-clip-text">
                            Mind Map by Tim
                        </span>
                        <span className="text-xl">🐾</span>
                    </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
