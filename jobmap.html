<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>思维导图：What makes a job great?</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 和 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 引入 Babel 以解析 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap');

        body {
            font-family: 'Nunito', 'Comic Sans MS', sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(186, 230, 253, 0.4), transparent 40%),
                radial-gradient(circle at 80% 30%, rgba(253, 230, 138, 0.3), transparent 40%);
            min-height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden; 
        }

        /* 节点入场动画：从左侧弹性滑入 */
        .node-enter {
            animation: slideInElastic 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            transform-origin: left center;
        }

        @keyframes slideInElastic {
            0% { transform: scale(0.6) translateX(-15px); opacity: 0; }
            100% { transform: scale(1) translateX(0); opacity: 1; }
        }

        /* 头像占位符样式 */
        .avatar-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #e0f2fe, #bae6fd);
            color: #0369a1;
            font-size: 1rem;
            text-align: center;
            line-height: 1.1;
            padding: 4px;
        }

        /* 魔法连接线动画 */
        .magic-line {
            background-size: 8px 8px;
            background-image: linear-gradient(to right, #7dd3fc 50%, transparent 50%);
            animation: moveDashedLine 1s linear infinite;
        }

        @keyframes moveDashedLine {
            0% { background-position: 0 0; }
            100% { background-position: 8px 0; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        let isMapDraggingGlobal = false;

        // 数据结构：优化了大小写规范，去掉了 highlight 属性，以美观为第一要务
        // Job 使用 Title Case (首字母大写)，Reason 使用 Sentence Case (句首大写)
        const mindMapData = {
            title: "What makes a job great?",
            type: "root",
            children: [
                {
                    type: "family",
                    image: "https://img.heliar.top/file/1775834347697_截屏2026-04-10_23.18.16.png", // 刘涛
                    children: [
                        {
                            title: "Father", type: "person", icon: "👨",
                            children: [{
                                title: "Taxi Driver", type: "job", icon: "🚕",
                                children: [{ title: "Take people to different places", type: "reason", icon: "🗺️" }]
                            }]
                        },
                        {
                            title: "Mother", type: "person", icon: "👩",
                            children: [{
                                title: "Cook", type: "job", icon: "👩‍🍳",
                                children: [{ title: "Make delicious food", type: "reason", icon: "🍲" }]
                            }]
                        }
                    ]
                },
                {
                    type: "family",
                    image: "https://img.heliar.top/file/1775834334119_截屏2026-04-10_23.18.37.png", // 苏海
                    children: [
                        {
                            title: "Father", type: "person", icon: "👨",
                            children: [{
                                title: "Doctor", type: "job", icon: "👨‍⚕️",
                                children: [{ title: "Help sick people", type: "reason", icon: "❤️" }]
                            }]
                        },
                        {
                            title: "Mother", type: "person", icon: "👩",
                            children: [{
                                title: "Worker", type: "job", icon: "👷‍♀️",
                                children: [{ title: "Make nice sweets", type: "reason", icon: "🍬" }]
                            }]
                        }
                    ]
                },
                {
                    type: "family",
                    image: "https://img.heliar.top/file/1775834336086_截屏2026-04-10_23.18.24.png", // 杨玲
                    children: [
                        {
                            title: "Father", type: "person", icon: "👨",
                            children: [{
                                title: "Police Officer", type: "job", icon: "👮‍♂️",
                                children: [{ title: "Keep us safe", type: "reason", icon: "🛡️" }]
                            }]
                        },
                        {
                            title: "Mother", type: "person", icon: "👩",
                            children: [{
                                title: "Teacher", type: "job", icon: "👩‍🏫",
                                children: [{ title: "Help children learn new things", type: "reason", icon: "📚" }]
                            }]
                        }
                    ]
                }
            ]
        };

        // 递归渲染树节点组件
        const TreeNode = ({ node, isFirst, isLast, expandAllTrigger, collapseAllTrigger }) => {
            const [expanded, setExpanded] = useState(node.type === 'root' || node.type === 'family');

            useEffect(() => {
                if (expandAllTrigger > 0) setExpanded(true);
            }, [expandAllTrigger]);

            useEffect(() => {
                if (collapseAllTrigger > 0) {
                    setExpanded(node.type === 'root' || node.type === 'family'); 
                }
            }, [collapseAllTrigger]);

            const handleNodeClick = (e) => {
                if (isMapDraggingGlobal) {
                    e.stopPropagation();
                    return;
                }
                
                if (node.type === 'family') return;
                if (node.children) setExpanded(!expanded);
            };

            let nodeStyle = "";
            let content = null;

            if (node.type === 'root') {
                // 主标题缩小比例，保持干练
                nodeStyle = "bg-gradient-to-r from-blue-500 via-sky-500 to-indigo-500 text-white text-2xl font-black px-8 py-3.5 rounded-3xl shadow-[0_8px_20px_-5px_rgba(59,130,246,0.5)] border-[3px] border-white/40 cursor-pointer hover:scale-105 transition-all duration-300 relative overflow-hidden group";
                content = (
                    <div className="flex items-center space-x-3 relative z-10">
                        <span className="text-3xl drop-shadow-lg group-hover:rotate-12 transition-transform">🎯</span>
                        <span className="tracking-wide whitespace-nowrap" style={{textShadow: "0 2px 4px rgba(0,0,0,0.3)"}}>{node.title}</span>
                    </div>
                );
            } else if (node.type === 'family') {
                // 头像大幅放大至 88px 
                nodeStyle = "relative z-10 flex-shrink-0 hover:scale-105 transition-transform duration-300";
                content = (
                    <div className="w-[88px] h-[88px] rounded-full border-[4px] border-white shadow-[0_6px_15px_rgba(0,0,0,0.12)] overflow-hidden bg-sky-100 relative">
                        <img 
                            src={node.image} 
                            alt="Avatar" 
                            className="w-full h-full object-cover pointer-events-none" 
                            onError={(e) => {
                                e.target.style.display = 'none';
                                const span = document.createElement('span');
                                span.className = 'w-full h-full avatar-placeholder font-black tracking-widest pointer-events-none';
                                span.innerText = '?';
                                e.target.parentNode.appendChild(span);
                            }}
                        />
                    </div>
                );
            } else if (node.type === 'person') {
                // 父母层级：圆润舒适
                nodeStyle = "bg-indigo-50 text-indigo-800 text-lg font-bold px-4 py-2 rounded-full shadow-sm cursor-pointer hover:bg-indigo-100 hover:shadow-md transition-all border border-indigo-100 flex items-center space-x-2";
                content = (
                    <>
                        <span className="text-xl pointer-events-none">{node.icon}</span>
                        <span className="tracking-wide pointer-events-none">{node.title}</span>
                    </>
                );
            } else if (node.type === 'job') {
                // 职业层级：统一且美观的高级白卡片配色，突出深色粗体字
                nodeStyle = `bg-white px-5 py-3 rounded-[1.25rem] shadow-sm border-b-[3px] border-sky-400 cursor-pointer hover:shadow-md hover:-translate-y-1 transition-all flex items-center space-x-3`;
                content = (
                    <>
                        <div className="bg-slate-50 w-11 h-11 rounded-full flex items-center justify-center text-2xl shadow-inner border border-slate-100 pointer-events-none">
                            {node.icon}
                        </div>
                        <span className={`text-xl md:text-2xl font-black text-slate-800 tracking-wide pointer-events-none whitespace-nowrap`}>
                            {node.title}
                        </span>
                        {/* 极简提示：只有跳动的问号，无多余文字 */}
                        {node.children && !expanded && (
                            <span className="ml-2 text-xl filter drop-shadow-md animate-bounce pointer-events-none">
                                ❓
                            </span>
                        )}
                    </>
                );
            } else if (node.type === 'reason') {
                // 原因层级：温暖的浅黄色便签风格，字号适中清晰
                nodeStyle = "bg-gradient-to-br from-amber-50 to-yellow-100 px-5 py-3 rounded-[1.25rem] shadow-sm border border-amber-300 flex items-center space-x-3 cursor-default transform hover:rotate-1 transition-transform";
                content = (
                    <>
                        <span className="text-2xl filter drop-shadow-sm pointer-events-none">{node.icon}</span>
                        <span className={`text-lg md:text-xl font-bold text-slate-700 tracking-wide pointer-events-none whitespace-nowrap`}>
                            {node.title}
                        </span>
                    </>
                );
            }

            return (
                <div className="flex items-center node-enter min-w-max">
                    {/* 节点主体 */}
                    <div onClick={handleNodeClick} className={`${nodeStyle}`}>
                        {content}
                    </div>

                    {/* 子节点连线与递归容器，间距极限压缩，消除空旷感 */}
                    {expanded && node.children && (
                        <div className="relative flex flex-col ml-5 py-1">
                            <div className="absolute -left-5 top-1/2 w-5 h-[3px] magic-line -translate-y-1/2"></div>
                            {node.children.map((child, idx) => {
                                const isFirstChild = idx === 0;
                                const isLastChild = idx === node.children.length - 1;
                                const isOnlyChild = node.children.length === 1;

                                return (
                                    <div key={idx} className="relative flex items-center py-2.5 pl-6">
                                        {!isOnlyChild && (
                                            <div className={`absolute left-0 w-[3px] bg-sky-300
                                                ${isFirstChild ? 'top-1/2 bottom-0 rounded-tl-md' : ''}
                                                ${isLastChild ? 'top-0 h-1/2 rounded-bl-md' : ''}
                                                ${!isFirstChild && !isLastChild ? 'top-0 bottom-0' : ''}
                                            `}></div>
                                        )}
                                        <div className="absolute left-0 top-1/2 w-6 h-[3px] bg-sky-300 -translate-y-1/2 rounded-r-md"></div>
                                        
                                        <TreeNode 
                                            node={child} 
                                            isFirst={isFirstChild} 
                                            isLast={isLastChild}
                                            expandAllTrigger={expandAllTrigger}
                                            collapseAllTrigger={collapseAllTrigger}
                                        />
                                    </div>
                                )
                            })}
                        </div>
                    )}
                </div>
            );
        };

        function App() {
            const [expandAllTrigger, setExpandAllTrigger] = useState(0);
            const [collapseAllTrigger, setCollapseAllTrigger] = useState(0);

            // 画布平移与缩放状态
            const [scale, setScale] = useState(1);
            const [pan, setPan] = useState({ x: 100, y: 150 }); 
            
            const isDraggingRef = useRef(false);
            const [isDraggingState, setIsDraggingState] = useState(false);
            const lastMousePos = useRef({ x: 0, y: 0 });

            // 初始页面加载时，根据屏幕大小设置合适的起始视角
            useEffect(() => {
                const vw = window.innerWidth;
                const vh = window.innerHeight;
                setScale(vw < 1024 ? 0.9 : 1.1);
                setPan({ x: vw * 0.08, y: vh * 0.25 });
            }, []);

            // ✨核心亮点：一键全开并智能居中匹配屏幕✨
            const handleExpandAll = () => {
                setExpandAllTrigger(prev => prev + 1);
                const vw = window.innerWidth;
                const vh = window.innerHeight;
                
                // 动态计算能将全图容纳的最佳缩放比例
                const targetScale = vw < 1200 ? 0.7 : 0.85; 
                setScale(targetScale);
                
                // 智能计算中心点：将展开后的整体方块动态居中于视口
                const targetX = Math.max(30, (vw - (1050 * targetScale)) / 2);
                const targetY = Math.max(30, (vh - (680 * targetScale)) / 2);
                
                setPan({ x: targetX, y: targetY });
            };

            const handleCollapseAll = () => {
                setCollapseAllTrigger(prev => prev + 1);
                // 还原为特写镜头，聚焦局部
                const vw = window.innerWidth;
                const vh = window.innerHeight;
                setScale(vw < 1024 ? 0.9 : 1.1);
                setPan({ x: vw * 0.08, y: vh * 0.25 });
            };

            const handleMouseDown = (e) => {
                if (e.target.closest('.no-drag-area')) return;
                
                isDraggingRef.current = true;
                setIsDraggingState(true);
                isMapDraggingGlobal = false;
                lastMousePos.current = { x: e.clientX, y: e.clientY };
            };

            const handleMouseMove = (e) => {
                if (!isDraggingRef.current) return;
                
                const deltaX = e.clientX - lastMousePos.current.x;
                const deltaY = e.clientY - lastMousePos.current.y;
                
                if (Math.abs(deltaX) > 3 || Math.abs(deltaY) > 3) {
                    isMapDraggingGlobal = true; 
                }

                setPan(prev => ({ x: prev.x + deltaX, y: prev.y + deltaY }));
                lastMousePos.current = { x: e.clientX, y: e.clientY };
            };

            const handleMouseUp = () => {
                isDraggingRef.current = false;
                setIsDraggingState(false);
                setTimeout(() => { isMapDraggingGlobal = false; }, 50);
            };

            const handleWheel = (e) => {
                if (e.ctrlKey || e.metaKey) {
                    e.preventDefault();
                    const delta = e.deltaY * -0.005;
                    setScale(s => Math.min(Math.max(s + delta, 0.3), 2.5));
                } else {
                    setPan(prev => ({ x: prev.x - e.deltaX, y: prev.y - e.deltaY }));
                }
            };

            const handleTouchStart = (e) => {
                if (e.target.closest('.no-drag-area')) return;
                if (e.touches.length === 1) {
                    isDraggingRef.current = true;
                    setIsDraggingState(true);
                    isMapDraggingGlobal = false;
                    lastMousePos.current = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                }
            };

            const handleTouchMove = (e) => {
                if (!isDraggingRef.current || e.touches.length !== 1) return;
                const deltaX = e.touches[0].clientX - lastMousePos.current.x;
                const deltaY = e.touches[0].clientY - lastMousePos.current.y;
                
                if (Math.abs(deltaX) > 3 || Math.abs(deltaY) > 3) isMapDraggingGlobal = true;

                setPan(prev => ({ x: prev.x + deltaX, y: prev.y + deltaY }));
                lastMousePos.current = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            };

            return (
                <div className="w-full h-screen flex flex-col relative overflow-hidden bg-slate-50">
                    
                    {/* 顶部控制栏 */}
                    <div className="w-full bg-white/80 backdrop-blur-xl shadow-sm p-4 md:px-8 flex flex-col md:flex-row items-center justify-between z-40 border-b border-slate-200/50 no-drag-area relative">
                        <div className="flex items-center space-x-4 mb-3 md:mb-0">
                            <div className="w-10 h-10 bg-gradient-to-br from-yellow-300 to-orange-400 rounded-xl flex items-center justify-center shadow-lg transform -rotate-6">
                                <span className="text-xl text-white">💡</span>
                            </div>
                            <div>
                                <h1 className="text-xl md:text-2xl font-black text-slate-800 tracking-wide">Let's Review</h1>
                                <p className="text-xs md:text-sm font-bold text-sky-600 tracking-wider">Drag to pan, use buttons to zoom</p>
                            </div>
                        </div>
                        <div className="flex space-x-3">
                            <button 
                                onClick={handleExpandAll}
                                className="bg-gradient-to-r from-sky-500 to-blue-600 hover:from-sky-400 hover:to-blue-500 text-white font-black py-2.5 px-6 rounded-full shadow-[0_6px_12px_-4px_rgba(59,130,246,0.5)] transition-all active:scale-95 active:shadow-none text-sm md:text-base"
                            >
                                Expand All
                            </button>
                            <button 
                                onClick={handleCollapseAll}
                                className="bg-white hover:bg-slate-50 text-slate-600 font-black py-2.5 px-6 rounded-full shadow-[0_6px_12px_-4px_rgba(0,0,0,0.1)] border-2 border-slate-200 transition-all active:scale-95 active:shadow-none text-sm md:text-base"
                            >
                                Reset
                            </button>
                        </div>
                    </div>

                    {/* 无限画布互动区 */}
                    <div 
                        className={`flex-1 relative w-full h-full ${isDraggingState ? 'cursor-grabbing' : 'cursor-grab'}`}
                        onMouseDown={handleMouseDown}
                        onMouseMove={handleMouseMove}
                        onMouseUp={handleMouseUp}
                        onMouseLeave={handleMouseUp}
                        onTouchStart={handleTouchStart}
                        onTouchMove={handleTouchMove}
                        onTouchEnd={handleMouseUp}
                        onWheel={handleWheel}
                    >
                        <div 
                            className="absolute top-0 left-0"
                            style={{
                                transform: `translate(${pan.x}px, ${pan.y}px) scale(${scale})`,
                                transformOrigin: '0 0',
                                /* 加入了平滑的缩放和位移过渡效果，一键居中时会有运镜感 */
                                transition: isDraggingState ? 'none' : 'transform 0.4s cubic-bezier(0.16, 1, 0.3, 1)'
                            }}
                        >
                            <TreeNode 
                                node={mindMapData} 
                                expandAllTrigger={expandAllTrigger}
                                collapseAllTrigger={collapseAllTrigger}
                            />
                        </div>
                    </div>

                    {/* 左下角：缩放控制台 */}
                    <div className="absolute bottom-6 left-6 z-40 bg-white/90 backdrop-blur-xl shadow-[0_8px_25px_rgba(0,0,0,0.1)] rounded-full p-1.5 border border-white flex flex-col items-center no-drag-area">
                        <button 
                            onClick={() => setScale(s => Math.min(s + 0.15, 2.5))} 
                            className="w-10 h-10 flex items-center justify-center text-2xl text-slate-500 hover:text-sky-500 hover:bg-sky-50 rounded-full transition-colors active:scale-90"
                        >
                            ＋
                        </button>
                        <div className="w-6 h-[2px] bg-slate-200 my-1 rounded-full"></div>
                        <span className="text-[10px] font-black text-sky-600 my-1 font-mono tracking-tighter">
                            {Math.round(scale * 100)}%
                        </span>
                        <div className="w-6 h-[2px] bg-slate-200 my-1 rounded-full"></div>
                        <button 
                            onClick={() => setScale(s => Math.max(s - 0.15, 0.3))} 
                            className="w-10 h-10 flex items-center justify-center text-3xl pb-1.5 text-slate-500 hover:text-sky-500 hover:bg-sky-50 rounded-full transition-colors active:scale-90"
                        >
                            －
                        </button>
                        <div className="w-6 h-[2px] bg-slate-200 my-1 rounded-full"></div>
                        <button 
                            onClick={() => { 
                                const vw = window.innerWidth;
                                const vh = window.innerHeight;
                                setScale(vw < 1024 ? 0.9 : 1.1); 
                                setPan({x: vw * 0.08, y: vh * 0.25}); 
                            }} 
                            className="w-10 h-10 flex items-center justify-center text-xl text-slate-500 hover:text-sky-500 hover:bg-sky-50 rounded-full transition-colors active:scale-90"
                        >
                            ⌖
                        </button>
                    </div>

                    {/* ✨ Tim 的专属水印标记 ✨ */}
                    <div className="absolute bottom-6 right-6 z-40 bg-white/90 backdrop-blur-xl px-5 py-2.5 rounded-full shadow-[0_8px_20px_rgba(0,0,0,0.08)] border border-white flex items-center space-x-2 transition-all hover:scale-105 cursor-default no-drag-area">
                        <span className="text-lg">✨</span>
                        <span className="font-black tracking-widest uppercase text-xs md:text-sm bg-gradient-to-r from-sky-500 to-blue-600 text-transparent bg-clip-text">
                            Mind Map by Tim
                        </span>
                        <span className="text-lg">🐾</span>
                    </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
