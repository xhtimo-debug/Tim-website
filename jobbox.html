<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>迪士尼风：神秘盲盒</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap');

        body {
            /* 使用更现代、圆润的无衬线字体，迪士尼常用风格 */
            font-family: 'Nunito', 'Comic Sans MS', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            /* 添加一点梦幻的模糊光晕背景 */
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(196, 181, 253, 0.2), transparent 40%),
                radial-gradient(circle at 85% 30%, rgba(125, 211, 252, 0.2), transparent 40%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 盲盒摇晃动画 (更平滑) */
        .box-shake {
            animation: magicShake 0.6s cubic-bezier(.36,.07,.19,.97) both infinite;
            transform-origin: center center;
        }

        @keyframes magicShake {
            0%, 100% { transform: scale(1.05) rotate(0deg); }
            25% { transform: scale(1.05) rotate(3deg); }
            50% { transform: scale(1.05) rotate(0deg); }
            75% { transform: scale(1.05) rotate(-3deg); }
        }

        /* 盲盒魔法悬浮 */
        .box-float {
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        /* 极致平滑的入场动画 */
        .modal-enter {
            animation: elegantPop 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        @keyframes elegantPop {
            0% { transform: scale(0.9) translateY(20px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .reveal-enter {
            animation: slideUpFade 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUpFade {
            0% { transform: translateY(15px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        /* 迪士尼风梦幻渐变按钮 */
        .magic-btn {
            background: linear-gradient(135deg, #60a5fa, #8b5cf6);
            box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .magic-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px -5px rgba(99, 102, 241, 0.5);
            background: linear-gradient(135deg, #3b82f6, #7c3aed);
        }
        .magic-btn:active {
            transform: translateY(2px);
            box-shadow: 0 5px 15px -5px rgba(99, 102, 241, 0.4);
        }

        .magic-btn-why {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            box-shadow: 0 10px 25px -5px rgba(245, 158, 11, 0.4);
        }
        .magic-btn-why:hover {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            box-shadow: 0 15px 35px -5px rgba(245, 158, 11, 0.5);
        }

        /* 标题流光效果 */
        .text-gradient {
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 改为柔和梦幻的渐变色组合
        const jobData = [
            { id: 1, job: "Singer", emoji: "🎤", why: "Sings nice songs!", bg: "from-pink-300 to-rose-400" }, 
            { id: 2, job: "Firefighter", emoji: "🚒", why: "Puts out fires!", bg: "from-red-300 to-orange-400" }, 
            { id: 3, job: "Dentist", emoji: "🦷", why: "Checks our teeth!", bg: "from-cyan-300 to-blue-400" }, 
            { id: 4, job: "Painter", emoji: "🎨", why: "Draws nice pictures!", bg: "from-fuchsia-300 to-purple-400" }, 
            { id: 5, job: "Pilot", emoji: "✈️", why: "Flies the plane!", bg: "from-teal-300 to-emerald-400" }, 
            { id: 6, job: "Baker", emoji: "🥐", why: "Makes sweet bread!", bg: "from-amber-300 to-yellow-500" }, 
            { id: 7, job: "Postman", emoji: "✉️", why: "Brings us letters!", bg: "from-sky-300 to-indigo-400" }, 
            { id: 8, job: "Cleaner", emoji: "🧹", why: "Keeps the city clean!", bg: "from-lime-300 to-green-400" }  
        ];

        function App() {
            const [openedBoxes, setOpenedBoxes] = useState([]);
            const [activeBox, setActiveBox] = useState(null);
            const [revealStep, setRevealStep] = useState(0); 
            const [isShaking, setIsShaking] = useState(null);

            const handleBoxClick = (job) => {
                if (openedBoxes.includes(job.id)) return;
                
                setIsShaking(job.id);
                try {
                    const audio = new Audio('https://www.soundjay.com/misc/sounds/magic-chime-02.mp3');
                    audio.volume = 0.4;
                    audio.play().catch(e => {});
                } catch(e){}

                setTimeout(() => {
                    setIsShaking(null);
                    setActiveBox(job);
                    setRevealStep(0); 
                    setOpenedBoxes([...openedBoxes, job.id]);
                    
                    // 柔和的迪士尼魔法撒花
                    confetti({
                        particleCount: 80,
                        spread: 60,
                        origin: { y: 0.65 },
                        colors: ['#a78bfa', '#60a5fa', '#f472b6', '#fbbf24'],
                        disableForReducedMotion: true
                    });
                }, 700);
            };

            const handleNextStep = () => {
                if (revealStep === 0) {
                    setRevealStep(1); 
                } else if (revealStep === 1) {
                    setRevealStep(2); 
                    confetti({
                        particleCount: 40,
                        spread: 50,
                        colors: ['#fbbf24', '#f59e0b', '#ffffff'],
                        origin: { y: 0.6 }
                    });
                }
            };

            const closeModal = () => setActiveBox(null);

            return (
                <div className="min-h-screen flex flex-col items-center py-12 px-4 relative">
                    
                    {/* 简约高级的标题区：去掉了蓝色边框 */}
                    <div className="text-center mb-12 relative z-10">
                        <h1 className="text-5xl md:text-6xl font-black mb-2 tracking-wide filter drop-shadow-sm">
                            <span className="bg-gradient-to-r from-violet-500 via-fuchsia-500 to-sky-500 text-gradient">
                                ✨ MYSTERY BOXES ✨
                            </span>
                        </h1>
                        <p className="text-xl font-bold text-slate-400 tracking-widest uppercase">
                            Great Jobs Adventure
                        </p>
                    </div>

                    {/* 盲盒网格区 */}
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-6 md:gap-8 max-w-5xl w-full relative z-10">
                        {jobData.map((job) => {
                            const isOpened = openedBoxes.includes(job.id);
                            const shakingClass = isShaking === job.id ? 'box-shake' : (isOpened ? '' : 'box-float');
                            
                            return (
                                <div 
                                    key={job.id}
                                    onClick={() => handleBoxClick(job)}
                                    className={`relative flex flex-col items-center justify-center h-48 md:h-56 rounded-[2.5rem] transition-all duration-300 cursor-pointer
                                        ${isOpened 
                                            ? 'bg-slate-100 bg-opacity-50 shadow-inner scale-95' 
                                            : `bg-gradient-to-br ${job.bg} shadow-[0_15px_35px_-10px_rgba(0,0,0,0.2)] hover:shadow-[0_20px_40px_-10px_rgba(0,0,0,0.3)] hover:scale-[1.02] ring-4 ring-white/30 ring-inset`}
                                        ${shakingClass}
                                    `}
                                    style={{ animationDelay: `${job.id * 0.15}s` }} 
                                >
                                    {isOpened ? (
                                        <span className="text-6xl filter grayscale opacity-30">{job.emoji}</span>
                                    ) : (
                                        <div className="flex flex-col items-center text-white">
                                            <span className="text-6xl md:text-7xl font-black drop-shadow-lg mb-3">?</span>
                                            <div className="bg-white/20 backdrop-blur-sm text-white font-bold text-lg px-5 py-1.5 rounded-full shadow-sm tracking-wider">
                                                NO. {job.id}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>

                    {/* ✨ Tim 的专属水印标记 (右下角悬浮) ✨ */}
                    <div className="fixed bottom-6 right-6 z-40 bg-white/40 backdrop-blur-md px-6 py-2.5 rounded-full shadow-lg border border-white/60 flex items-center space-x-2 transition-all hover:scale-105 hover:bg-white/60 cursor-default">
                        <span className="text-xl">✨</span>
                        <span className="font-black tracking-widest uppercase text-sm md:text-base bg-gradient-to-r from-violet-500 to-sky-500 text-transparent bg-clip-text">
                            Designed by Tim
                        </span>
                        <span className="text-xl">🐾</span>
                    </div>

                    {/* 互动模态框 - 极简白卡片风格 */}
                    {activeBox && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm p-4 transition-all">
                            <div className="modal-enter bg-white rounded-[3rem] p-10 max-w-lg w-full shadow-[0_20px_60px_-15px_rgba(0,0,0,0.3)] relative flex flex-col items-center">
                                
                                {/* 极简的关闭按钮 */}
                                <button 
                                    onClick={closeModal}
                                    className="absolute top-6 right-6 text-slate-300 hover:text-slate-500 hover:bg-slate-100 w-12 h-12 rounded-full font-bold text-xl transition-all flex items-center justify-center"
                                >
                                    ✕
                                </button>
                                
                                {/* 物品展示区：去掉了粗重边框 */}
                                <div className="text-8xl md:text-[8rem] mb-8 drop-shadow-xl animate-bounce mt-2" style={{filter: "drop-shadow(0 15px 15px rgba(0,0,0,0.15))"}}>
                                    {activeBox.emoji}
                                </div>
                                
                                {/* 单词揭晓区：使用更柔和优雅的字体颜色 */}
                                <div className="h-24 w-full flex items-center justify-center mb-2">
                                    {revealStep >= 1 ? (
                                        <h3 className="reveal-enter text-5xl md:text-6xl font-black text-slate-700 uppercase tracking-widest text-center">
                                            {activeBox.job}
                                        </h3>
                                    ) : (
                                        <h3 className="text-2xl text-slate-300 font-bold tracking-wider">
                                            What is the job?
                                        </h3>
                                    )}
                                </div>

                                {/* WHY 气泡区：去掉了生硬的边框，改为轻柔的弥散阴影 */}
                                <div className="h-28 w-full flex items-center justify-center mb-8">
                                    {revealStep === 2 ? (
                                        <div className="reveal-enter bg-sky-50/80 rounded-[2rem] p-6 w-full shadow-sm relative flex flex-col items-center text-center">
                                            <p className="text-sky-400 font-bold mb-1 uppercase tracking-widest text-xs">Because...</p>
                                            <p className="text-slate-600 text-2xl md:text-3xl font-black">
                                                ✨ {activeBox.why}
                                            </p>
                                        </div>
                                    ) : null}
                                </div>

                                {/* 控制按钮区：迪士尼发光风格 */}
                                <div className="w-full flex flex-col space-y-3 px-4">
                                    {revealStep === 0 && (
                                        <button onClick={handleNextStep} className="magic-btn text-white font-black text-xl py-4 rounded-full w-full">
                                            Reveal the Job ✨
                                        </button>
                                    )}
                                    
                                    {revealStep === 1 && (
                                        <button onClick={handleNextStep} className="magic-btn magic-btn-why text-white font-black text-xl py-4 rounded-full w-full">
                                            WHY is it great? ❓
                                        </button>
                                    )}

                                    {revealStep === 2 && (
                                        <button onClick={closeModal} className="text-slate-400 hover:text-slate-600 font-bold text-lg py-3 rounded-full w-full transition-colors">
                                            Close ✕
                                        </button>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
